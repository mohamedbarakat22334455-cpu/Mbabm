<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MB SMART SYSTEM | الوحش المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #3b82f6; --bg: #050507; --card: rgba(23, 23, 27, 0.8);
            --border: rgba(255, 255, 255, 0.08); --text: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        
        body { 
            background: var(--bg); color: var(--text); height: 100vh; 
            display: flex; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050507 100%);
        }

        /* Sidebar - Glassmorphism Control Center */
        .sidebar { 
            width: 320px; background: var(--card); backdrop-filter: blur(20px);
            border-left: 1px solid var(--border); padding: 35px 20px;
            display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }

        .logo { font-size: 26px; font-weight: 900; color: var(--accent); text-align: center; margin-bottom: 20px; letter-spacing: 1px; }

        .btn-tool {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: #ccc; padding: 14px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; width: 100%; text-align: right; font-weight: 700;
        }
        .btn-tool:hover { background: var(--accent); color: white; transform: translateX(-5px); }

        /* Main Workspace */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px;
            scroll-behavior: smooth;
        }

        /* Bubbles - Professional Style */
        .bubble { 
            max-width: 85%; padding: 18px 22px; border-radius: 18px; line-height: 1.7;
            font-size: 15px; animation: fadeIn 0.4s ease; position: relative;
        }
        .user-msg { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .ai-msg { align-self: flex-end; background: rgba(59, 130, 246, 0.08); border-right: 4px solid var(--accent); color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Zone - The Area You Wanted */
        .input-zone { 
            background: var(--card); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .text-box-wrapper {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; position: relative;
        }
        textarea {
            width: 100%; background: transparent; border: none; color: white;
            resize: none; height: 100px; font-size: 16px; line-height: 1.5;
        }

        .action-bar { display: flex; justify-content: space-between; align-items: center; }
        
        .status-info { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #888; }
        .status-dot { width: 10px; height: 10px; background: #333; border-radius: 50%; }
        .active-dot { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        .send-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px 35px; border-radius: 12px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* Loader */
        .loader { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">MB SYSTEM v2</div>
        
        <div style="margin-bottom: 20px;">
            <p style="font-size: 12px; color: #666; margin-bottom: 10px;">إدارة المنهج والوسائط</p>
            <button class="btn-tool" onclick="document.getElementById('file-in').click()">📁 إرفاق (فيديو/صور/PDF)</button>
            <input type="file" id="file-in" hidden onchange="onFileSelected()">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <p style="font-size: 12px; color: #666;">أدوات التحكم الذكية</p>
            <button class="btn-tool" onclick="handleAction('summarize')">📝 تلخيص ذكي للمحتوى</button>
            <button class="btn-tool" onclick="handleAction('exam')">🧠 إنشاء اختبار تدريبي</button>
            <button class="btn-tool" onclick="handleAction('explain')">🔍 شرح مفصل للصور/الفيديو</button>
            <button class="btn-tool" style="margin-top: 20px; color: #ef4444;" onclick="document.getElementById('chat-window').innerHTML=''">🧹 مسح المحادثة</button>
        </div>

        <div id="file-status" style="margin-top: auto; font-size: 12px; color: var(--accent); text-align: center;"></div>
    </div>

    <div class="main-content">
        <div id="chat-window">
            <div class="bubble ai-msg">مرحباً بك في نظام MB المطور. ارفع الفيديو، الصور، أو الـ PDF، واسألني أي سؤال في منطقة الكتابة بالأسفل.</div>
        </div>

        <div class="input-zone">
            <div class="text-box-wrapper">
                <textarea id="user-msg" placeholder="اكتب أسئلتك هنا.. اسأل عن أي تفاصيل في المنهج أو الملف المرفوع"></textarea>
            </div>
            
            <div class="action-bar">
                <div class="status-info">
                    <div class="status-dot" id="dot"></div>
                    <span id="loader-text">النظام جاهز</span>
                    <div class="loader" id="loader"></div>
                </div>
                <button class="send-btn" onclick="handleAction('ask')">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <script>
        let currentFile = null;

        function onFileSelected() {
            currentFile = document.getElementById('file-in').files[0];
            if (currentFile) {
                document.getElementById('file-status').innerText = "تم تجهيز: " + currentFile.name;
                document.getElementById('dot').classList.add('active-dot');
                document.getElementById('loader-text').innerText = "تم إرفاق الملف";
            }
        }

        async function handleAction(mode) {
            const msgInput = document.getElementById('user-msg');
            const chatWindow = document.getElementById('chat-window');
            const loader = document.getElementById('loader');
            const msg = msgInput.value;

            if (!msg && !currentFile && mode === 'ask') return;

            // إضافة رسالة المستخدم
            chatWindow.innerHTML += `<div class="bubble user-msg">${msg || "طلب تحليل محتوى (" + mode + ")"}</div>`;
            msgInput.value = "";
            loader.style.display = "block";
            document.getElementById('loader-text').innerText = "جاري المعالجة...";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const fd = new FormData();
            fd.append('msg', msg);
            fd.append('mode', mode);
            if (currentFile) fd.append('file', currentFile);

            try {
                const res = await fetch('/chat', { method: 'POST', body: fd });
                const data = await res.json();
                
                chatWindow.innerHTML += `<div class="bubble ai-msg">${data.reply.replace(/\n/g, '<br>')}</div>`;
            } catch (e) {
                chatWindow.innerHTML += `<div class="bubble ai-msg" style="color: #ef4444;">عذراً، حدث خطأ في معالجة طلبك.</div>`;
            }

            loader.style.display = "none";
            document.getElementById('loader-text').innerText = "النظام جاهز";
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
