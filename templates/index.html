<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Notebook System</title>
    <style>
        :root {
            --bg-color: #080808;
            --glass-bg: rgba(25, 25, 25, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #475569; /* لون رمادي مزرق هادي جداً */
            --primary-hover: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* القائمة الجانبية (تأثير زجاجي) */
        .sidebar { 
            width: 280px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); /* التاثير الزجاجي رجع هنا */
            border-left: 1px solid var(--border-color); 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .logo { font-size: 22px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}

        .btn {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-color);
            color: var(--text-main); 
            padding: 15px; 
            border-radius: 10px;
            cursor: pointer; 
            text-align: right; 
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--text-muted); }

        /* منطقة المحادثة */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); }
        
        .status-bar { 
            height: 60px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            padding: 0 30px; 
            font-size: 13px; 
            color: var(--text-muted); 
            background: var(--glass-bg);
        }

        .chat-box { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 80%; padding: 18px 22px; border-radius: 15px; font-size: 15px; line-height: 1.6; position: relative;}
        .user { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); }
        .ai { align-self: flex-end; background: rgba(71, 85, 105, 0.2); border: 1px solid rgba(71, 85, 105, 0.5); }

        .source-tag { display: block; font-size: 11px; color: var(--primary-hover); margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }

        /* منطقة الإدخال */
        .input-area { padding: 30px; border-top: 1px solid var(--border-color); display: flex; gap: 15px; background: var(--bg-color); }
        input { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; color: white; padding: 15px 25px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .send-btn { background: var(--primary); border: none; color: white; padding: 0 30px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { background: var(--primary-hover); }

        /* أنيميشن التحميل (اللي كان ناقص) */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--text-main);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">My Notebook</div>
        
        <button class="btn" onclick="document.getElementById('file').click()">
            <div class="loader" id="upload-loader"></div>
            📁 رفع ملف المنهج
        </button>
        <input type="file" id="file" hidden accept=".pdf" onchange="upload()">
        
        <button class="btn" onclick="ask('summarize')">📝 تلخيص المنهج</button>
        <button class="btn" onclick="ask('quiz')">🧠 اختبرني بسؤال</button>
        
        <div style="margin-top: auto; font-size: 12px; color: var(--text-muted);">System Active</div>
    </div>

    <div class="main-content">
        <div class="status-bar" id="info">النظام جاهز. يرجى رفع ملف PDF للبدء.</div>
        
        <div class="chat-box" id="chat">
            <div class="msg ai">أهلاً بك. العقل الثاني جاهز للعمل. ارفع الملف لنتناقش فيه.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="q" placeholder="اسأل أي سؤال في المنهج...">
            <button class="send-btn" onclick="ask('ask')">إرسال</button>
        </div>
    </div>

    <script>
        // دالة الرفع المسترجعة بكامل تفاصيلها
        async function upload() {
            const file = document.getElementById('file').files[0];
            if (!file) return;

            const info = document.getElementById('info');
            const loader = document.getElementById('upload-loader');
            
            info.innerText = "جاري قراءة وتقسيم الكتاب...";
            loader.style.display = "block";
            
            const fd = new FormData();
            fd.append('file', file);
            
            try {
                const r = await fetch('/upload', {method:'POST', body:fd});
                const d = await r.json();
                info.innerText = `تم الرفع | الملف: ${file.name} | ${d.message}`;
            } catch(e) {
                info.innerText = "حدث خطأ أثناء الرفع.";
            } finally {
                loader.style.display = "none";
            }
        }

        // دالة السؤال الشاملة لكل الأوضاع
        async function ask(mode) {
            const qInput = document.getElementById('q');
            const chat = document.getElementById('chat');
            const question = qInput.value;
            
            if(mode === 'ask' && !question) return;

            // طباعة رسالة المستخدم
            let userText = question;
            if(mode === 'summarize') userText = "طلب: لخص لي هذا الجزء.";
            if(mode === 'quiz') userText = "طلب: اختبرني بسؤال من المنهج.";
            
            chat.innerHTML += `<div class="msg user">${userText}</div>`;
            qInput.value = '';

            // رسالة تحميل مؤقتة
            const loadingId = 'load-' + Date.now();
            chat.innerHTML += `<div class="msg ai" id="${loadingId}">جاري معالجة الطلب...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: question, mode: mode})
                });
                const data = await res.json();
                
                // تحديث الرد
                document.getElementById(loadingId).outerHTML = `
                    <div class="msg ai">
                        ${data.answer}
                        ${data.sources ? `<span class="source-tag">المصادر المرجعية: ${data.sources}</span>` : ''}
                    </div>`;
            } catch(e) {
                document.getElementById(loadingId).innerText = "حدث خطأ في الاتصال بالخادم.";
            }
            
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
