<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Gold AI - العقل الثاني</title>
    <style>
        :root { --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --accent: #38bdf8; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--glass); backdrop-filter: blur(10px); border-left: 1px solid rgba(255,255,255,0.1); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 20px; }
        
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: right; width: 100%; }
        .nav-btn:hover { background: var(--accent); color: black; transform: translateX(-5px); }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        
        .bubble { max-width: 85%; padding: 20px; border-radius: 18px; font-size: 15px; line-height: 1.7; position: relative; animation: fadeIn 0.4s ease; }
        .user { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .ai { align-self: flex-end; background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); }
        
        .source-tag { font-size: 11px; color: var(--accent); margin-top: 10px; display: block; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }

        /* Input Area */
        .input-area { padding: 30px; background: var(--bg); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 15px; align-items: center; }
        input { flex: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; padding: 15px 25px; outline: none; }
        .send-btn { background: var(--accent); color: black; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { opacity: 0.8; }

        /* Loader */
        .loader { width: 25px; height: 25px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">MB GOLD AI</div>
        <button class="nav-btn" onclick="document.getElementById('pdf-file').click()">📁 ارفع المنهج (PDF)</button>
        <input type="file" id="pdf-file" hidden accept=".pdf" onchange="handleUpload()">
        <button class="nav-btn" onclick="askAI('summarize')">📝 تلخيص المنهج</button>
        <button class="nav-btn" onclick="askAI('quiz')">🧠 اختبر ذكائي</button>
        <div id="status-msg" style="margin-top: auto; font-size: 12px; color: var(--accent); text-align: center;"></div>
    </div>

    <div class="main">
        <div class="chat-container" id="chat">
            <div class="bubble ai">مرحباً بك في النسخة المطورة. ارفع ملف المنهج الآن لنبدأ الدراسة الذكية.</div>
        </div>
        <div class="input-area">
            <div class="loader" id="loader"></div>
            <input type="text" id="user-input" placeholder="اسأل أي سؤال في المنهج المرفوع...">
            <button class="send-btn" onclick="askAI('ask')">إرسال</button>
        </div>
    </div>

    <script>
        async function handleUpload() {
            const file = document.getElementById('pdf-file').files[0];
            if (!file) return;
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status-msg').innerText = "جاري قراءة الملف...";
            
            const formData = new FormData();
            formData.append('file', file);
            
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-msg').innerText = data.message || data.error;
        }

        async function askAI(mode) {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat');
            const question = input.value;
            
            if (mode === 'ask' && !question) return;

            // إضافة رسالة المستخدم
            chat.innerHTML += `<div class="bubble user">${question || "طلب " + mode}</div>`;
            input.value = '';
            document.getElementById('loader').style.display = 'block';
            chat.scrollTop = chat.scrollHeight;

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question, mode: mode })
            });
            const data = await res.json();
            
            document.getElementById('loader').style.display = 'none';
            chat.innerHTML += `
                <div class="bubble ai">
                    ${data.answer.replace(/\n/g, '<br>')}
                    ${data.pages ? `<span class="source-tag">المصدر: صفحة ${data.pages}</span>` : ''}
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
